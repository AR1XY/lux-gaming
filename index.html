<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY CASINO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9f295 45%, #b38728 70%, #f9f295 100%);
            --gold-solid: #d4af37;
            --dark: #0a0a0a;
            --card: #141414;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Header */
        .header { margin-bottom: 25px; }
        h1 { 
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 34px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .level-badge {
            display: inline-block;
            border: 1px solid var(--gold-solid);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--gold-solid);
            margin-top: 8px;
            font-weight: bold;
        }

        /* Balance Section */
        .balance-card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-amount { font-size: 38px; font-weight: 800; margin-bottom: 15px; }
        
        .gold-btn {
            background: var(--gold);
            border: none;
            padding: 16px;
            border-radius: 14px;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .gold-btn:active { transform: scale(0.96); }

        /* Games Grid */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.3s;
        }
        .game-card:hover { border-color: var(--gold-solid); }
        .game-card i { 
            font-size: 26px; 
            background: var(--gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 12px; 
            display: block;
        }
        .game-card span { font-size: 13px; font-weight: 700; color: #ccc; text-transform: uppercase; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--card);
            width: 100%;
            max-width: 350px;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--gold-solid);
            text-align: center;
        }
        input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
            text-align: center;
        }
        .admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 onclick="tapAdmin()">AR1XY CASINO</h1>
        <div class="level-badge" id="lvl-txt">LVL 1 (0 XP)</div>
    </div>

    <div class="balance-card">
        <div style="font-size:12px; color:#666; letter-spacing:2px; margin-bottom:5px;">КАПИТАЛ</div>
        <div class="balance-amount"><span id="bal">0</span> 💸</div>
        <button class="gold-btn" onclick="clickMine()">ДОБЫТЬ 💸</button>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('dice')">
            <i class="fas fa-dice"></i>
            <span>DICE</span>
        </div>
        <div class="game-card" onclick="alert('Crash: Скоро...')">
            <i class="fas fa-chart-line"></i>
            <span>CRASH</span>
        </div>
        <div class="game-card" onclick="alert('Mines: Скоро...')">
            <i class="fas fa-bomb"></i>
            <span>MINES</span>
        </div>
        <div class="game-card" onclick="alert('Slots: Скоро...')">
            <i class="fas fa-redo"></i>
            <span>SLOTS</span>
        </div>
    </div>
</div>

<div id="m-dice" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-solid)">DICE</h2>
        <input type="number" id="dice-bet" value="100">
        <div id="dice-res" style="font-size: 50px; margin: 15px 0;">🎲</div>
        <button class="gold-btn" onclick="playDice()">КРУТИТЬ</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="m-admin" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-solid); margin-top:0;">ADMIN PANEL</h2>
        <div class="admin-row">
            <span>Баланс:</span>
            <button onclick="editStat('bal')" style="color:var(--gold-solid); background:none; border:none; cursor:pointer;">ИЗМЕНИТЬ</button>
        </div>
        <div class="admin-row">
            <span>Опыт (XP):</span>
            <button onclick="editStat('xp')" style="color:var(--gold-solid); background:none; border:none; cursor:pointer;">ИЗМЕНИТЬ</button>
        </div>
        <div class="admin-row">
            <span>Шанс (Dice %):</span>
            <input type="number" id="adm-chance" value="50" style="width:60px; margin:0;">
        </div>
        <button class="gold-btn" onclick="closeModals()">СОХРАНИТЬ</button>
    </div>
</div>

<script>
    let stats = {
        bal: parseInt(localStorage.getItem('cas_bal')) || 1000,
        xp: parseInt(localStorage.getItem('cas_xp')) || 0,
        chance: 50
    };

    function updateUI() {
        document.getElementById('bal').innerText = stats.bal.toLocaleString();
        let lvl = Math.floor(stats.xp / 200) + 1;
        document.getElementById('lvl-txt').innerText = `LVL ${lvl} (${stats.xp % 200} XP)`;
        localStorage.setItem('cas_bal', stats.bal);
        localStorage.setItem('cas_xp', stats.xp);
    }

    function clickMine() {
        stats.bal += 1;
        stats.xp += 1;
        updateUI();
    }

    function openGame(g) { document.getElementById('m-'+g).style.display = 'flex'; }
    function closeModals() { 
        stats.chance = parseInt(document.getElementById('adm-chance').value);
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
    }

    function playDice() {
        let bet = parseInt(document.getElementById('dice-bet').value);
        if(stats.bal < bet || bet < 1) return alert("Мало монет!");
        
        stats.bal -= bet;
        let rand = Math.random() * 100;
        let roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-res').innerText = roll;

        if(rand <= stats.chance) {
            let win = Math.floor(bet * 2);
            stats.bal += win; stats.xp += 20;
            alert("ВЫИГРЫШ: " + win);
        } else {
            alert("ПРОИГРЫШ");
        }
        updateUI();
    }

    function editStat(type) {
        let v = prompt("Новое значение:");
        if(v) { stats[type] = parseInt(v); updateUI(); }
    }

    let taps = 0;
    function tapAdmin() {
        taps++;
        if(taps >= 5) {
            if(prompt("PASS:") === "777") openGame('admin');
            taps = 0;
        }
    }

    updateUI();
</script>
</body>
</html>
