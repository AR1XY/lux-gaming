<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY CASINO GOLD ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9f295 45%, #b38728 70%, #f9f295 100%);
            --gold-s: #d4af37;
            --bg: #050505;
            --card: #111;
        }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Segoe UI', sans-serif; margin: 0;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 420px; margin: 0 auto; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }

        /* Live Feed */
        .live-feed { background: #000; height: 30px; border-bottom: 1px solid #222; font-size: 11px; display: flex; align-items: center; overflow: hidden; white-space: nowrap; }
        .feed-track { display: inline-block; animation: scroll 20s linear infinite; color: var(--gold-s); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* Профиль и Ранг */
        .header-profile { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .profile-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold-s); background: #000; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold-s); }
        .rank-label { text-align: right; }
        .rank-name { font-size: 12px; font-weight: bold; color: var(--gold-s); text-transform: uppercase; letter-spacing: 1px; }

        h1 { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; text-align: center; margin: 10px 0; cursor: pointer; font-weight: 900; }
        
        /* Кнопки и Баланс */
        .balance-card { background: var(--card); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px; padding: 15px; text-align: center; position: relative; overflow: hidden; }
        .bal-val { font-size: 30px; font-weight: 800; display: block; margin: 5px 0; }
        .xp-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--gold); transition: 0.3s; }

        .btn-work { background: var(--gold); border: none; padding: 16px; border-radius: 12px; color: #000; font-weight: 900; width: 100%; text-transform: uppercase; cursor: pointer; position: relative; transition: 0.1s; }
        .btn-work:active { transform: scale(0.97); }

        /* Particle effect */
        .coin-part { position: absolute; pointer-events: none; opacity: 1; animation: flyCoin 1s forwards; font-size: 18px; color: gold; z-index: 10; }
        @keyframes flyCoin { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -150px) scale(1.5) rotate(720deg); } }

        /* Игры и Кейсы */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .game-card i { font-size: 24px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; margin-bottom: 5px; }

        /* Кейсы */
        .case-roulette { height: 100px; border: 2px solid var(--gold-s); border-radius: 10px; margin: 15px 0; display: flex; align-items: center; overflow: hidden; position: relative; background: #000; }
        .roulette-inner { display: flex; position: absolute; left: 0; transition: 3s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .roulette-item { min-width: 60px; height: 60px; margin: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 8px; border: 1px solid #333; }
        .selector-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: white; transform: translateX(-50%); z-index: 5; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--gold-s); border-radius: 25px; padding: 20px; width: 100%; max-width: 340px; position: relative; }
        .btn-gold { background: var(--gold); border: none; padding: 12px; border-radius: 10px; color: #000; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin: 10px 0; border-radius: 10px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="live-feed">
    <div class="feed-track" id="feed">Загрузка выигрышей... | 🔥 King_Gold выиграл 2500 💸 в Tower | Anon_99 открыл Gold-Кейс | 🔥 Diamond_G сорвал Джекпот в Slots | 🏆 Владелец Ar1xUser зашел в сеть |</div>
</div>

<div class="container">
    <div class="header-profile">
        <div class="profile-info">
            <div class="avatar" id="prof-ava"><i class="fas fa-smile"></i></div>
            <h1 onclick="adminTap()">AR1XY CASINO</h1>
        </div>
        <div class="rank-label">
            <div class="rank-name" id="rank-name">Новичок</div>
            <div style="font-size:10px; color:#555;">(XP: <span id="xp-val">0</span>)</div>
        </div>
    </div>
    
    <div class="balance-card">
        <span id="bal" class="bal-val">0 💸</span>
        <div class="xp-bar" id="xp-bar" style="width: 0%"></div>
    </div>

    <button class="btn-work" onclick="clickJob(event)">ДОБЫТЬ 💸 (+5)</button>

    <div class="game-grid">
        <div class="game-card" onclick="alert('Игры работают в финальной сборке!')"><i class="fas fa-dice"></i><span>Dice</span></div>
        <div class="game-card" onclick="alert('Мины работают в финальной сборке!')"><i class="fas fa-bomb"></i><span>Mines</span></div>
        <div class="game-card" onclick="openGame('case')"><i class="fas fa-box-open"></i><span>КЕЙСЫ</span></div>
        <div class="game-card" onclick="alert('Краш работает в финальной сборке!')"><i class="fas fa-chart-line"></i><span>Crash</span></div>
    </div>
</div>

<div id="m-case" class="modal"><div class="modal-content">
    <h2>ОТКРЫТЬ КЕЙС (1000 💸)</h2>
    <div class="case-roulette">
        <div class="selector-line"></div>
        <div id="roulette" class="roulette-inner"></div>
    </div>
    <button class="btn-gold" id="case-btn" onclick="openCase()">КРУТИТЬ РУЛЕТКУ</button>
    <button onclick="closeModals()" style="color:#555; background:none; border:none; margin-top:10px; cursor:pointer;">ЗАКРЫТЬ</button>
</div></div>

<div id="m-admin" class="modal"><div class="modal-content">
    <h2>ADMIN</h2><p style="font-size:11px; color:#666;">PASSWORD: 777</p>
    <input type="number" id="adm-bal" placeholder="Установить баланс">
    <input type="number" id="adm-xp" placeholder="Установить XP">
    <button class="btn-gold" onclick="saveAdmin()">ПРИМЕНИТЬ</button>
    <button onclick="closeModals()" style="color:#555; background:none; border:none; margin-top:15px; cursor:pointer;">ВЫХОД</button>
</div></div>

<script>
    let d = { bal: parseInt(localStorage.getItem('f_b')) || 1000, xp: parseInt(localStorage.getItem('f_x')) || 0 };
    const items = ['💰','💰','💰','⭐','⭐','💎','💎','7️⃣','7️⃣','🔥','💀'];
    const rks = [
        { n: "Новичок", x: 0, ava: '<i class="fas fa-smile"></i>' },
        { n: "Игрок", x: 500, ava: '<i class="fas fa-user-check"></i>' },
        { n: "Хайроллер", x: 5000, ava: '<i class="fas fa-money-bill-wave"></i>' },
        { n: "Золотой Магнат", x: 20000, ava: '<i class="fas fa-gem"></i>' },
        { n: "ВЛАДЕЛЕЦ", x: 100000, ava: '<i class="fas fa-crown"></i>' }
    ];

    function upd() { 
        document.getElementById('bal').innerText = d.bal.toLocaleString() + " 💸";
        document.getElementById('xp-val').innerText = d.xp.toLocaleString();
        localStorage.setItem('f_b', d.bal); localStorage.setItem('f_x', d.xp);
        
        let rank = rks[0]; let nXp = 500;
        for (let r of rks) { if(d.xp >= r.x) { rank = r; nXp = rks[rks.indexOf(r)+1] ? rks[rks.indexOf(r)+1].x : r.x; } }
        document.getElementById('rank-name').innerText = rank.n;
        document.getElementById('prof-ava').innerHTML = rank.ava;
        let prog = (d.xp / nXp) * 100;
        document.getElementById('xp-bar').style.width = (prog > 100 ? 100 : prog) + "%";
    }

    function clickJob(e) {
        d.bal += 5; d.xp += 2; upd();
        // Эффект монеток
        for (let i=0; i<3; i++) {
            let p = document.createElement('div'); p.className = 'coin-part'; p.innerText = '💸';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 1000);
        }
    }

    // КЕЙСЫ
    function openCase() {
        if(d.bal < 1000) return alert("Мало монет!");
        d.bal -= 1000; upd();
        document.getElementById('case-btn').style.display = 'none';
        const roul = document.getElementById('roulette'); roul.innerHTML = ''; roul.style.transition = 'none'; roul.style.left = '0';
        for(let i=0; i<40; i++) {
            let it = items[Math.floor(Math.random()*items.length)];
            roul.innerHTML += `<div class="roulette-item">${it}</div>`;
        }
        let win = items[Math.floor(Math.random()*items.length)];
        let winDiv = document.createElement('div'); winDiv.className = 'roulette-item'; winDiv.id = 'win'; winDiv.innerText = win;
        roul.innerHTML += winDiv.outerHTML; roul.innerHTML += '<div class="roulette-item">💀</div><div class="roulette-item">💰</div>';
        
        setTimeout(() => {
            roul.style.transition = '3s cubic-bezier(0.1, 0.7, 0.1, 1)';
            roul.style.left = - (winDiv.offsetWidth + 20) * 38 + 'px'; // Плавный сдвиг к выигрышу
        }, 100);

        setTimeout(() => {
            let p = 0;
            if(win === '💰') p = 500; if(win === '⭐') p = 1500; if(win === '💎') p = 5000; if(win === '7️⃣') p = 10000; if(win === '🔥') p = 50000; if(win === '💀') alert("LOSE");
            d.bal += p; alert("ВЫИГРАЛ: " + p); document.getElementById('case-btn').style.display = 'block'; upd();
        }, 3200);
    }

    function openGame(g) { document.getElementById('m-'+g).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    let t = 0; function adminTap() { t++; if(t >= 5) { if(prompt("PASS") === "777") openGame('admin'); t = 0; } }
    function saveAdmin() { 
        let b = document.getElementById('adm-bal').value; let x = document.getElementById('adm-xp').value;
        if(b) d.bal = parseInt(b); if(x) d.xp = parseInt(x); upd(); closeModals();
    }
    upd();
</script>
</body>
</html>
