<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY CASINO LUX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9f295 45%, #b38728 70%, #f9f295 100%);
            --gold-s: #d4af37;
            --bg: #050505;
            --card: #111;
        }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; justify-content: center; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }

        /* Ранг и Опыт */
        .rank-badge {
            text-align: center; font-size: 10px; letter-spacing: 2px;
            color: var(--gold-s); text-transform: uppercase; font-weight: bold;
            margin-bottom: -10px;
        }

        h1 { 
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 32px; font-weight: 900; text-align: center; margin: 5px 0; cursor: pointer;
        }

        .balance-box {
            background: var(--card); border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 25px; padding: 25px; text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            position: relative; overflow: hidden;
        }
        
        .xp-bar {
            position: absolute; bottom: 0; left: 0; height: 3px;
            background: var(--gold); transition: 0.3s;
        }

        .bal-val { font-size: 38px; font-weight: 800; display: block; margin: 10px 0; }

        .btn-click {
            background: var(--gold); border: none; padding: 18px;
            border-radius: 15px; color: #000; font-weight: 900;
            width: 100%; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); transition: 0.1s;
        }
        .btn-click:active { transform: scale(0.95); box-shadow: none; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .game-card {
            background: var(--card); border: 1px solid #222;
            padding: 20px; border-radius: 20px; text-align: center; cursor: pointer;
        }
        .game-card i { 
            font-size: 26px; background: var(--gold); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px; display: block;
        }

        /* Modals */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98); z-index: 1000; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-content {
            background: #111; border: 1px solid var(--gold-s);
            border-radius: 30px; padding: 30px; width: 100%; max-width: 320px; text-align: center;
        }

        .admin-input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; padding: 12px; margin: 10px 0; border-radius: 10px; text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="rank-badge" id="rank-name">НОВИЧОК</div>
    <h1 onclick="adm()">AR1XY CASINO</h1>
    
    <div class="balance-box">
        <span style="font-size: 10px; color: #666; letter-spacing: 2px;">ТЕКУЩИЙ БАЛАНС</span>
        <span class="bal-val" id="bal">0 💸</span>
        <div style="font-size: 11px; color: #aaa;" id="xp-text">XP: 0 / 100</div>
        <div class="xp-bar" id="xp-bar" style="width: 0%"></div>
    </div>

    <button class="btn-click" onclick="clickWork()">КЛИКАТЬ (+5 💸)</button>

    <div class="game-grid">
        <div class="game-card" onclick="alert('Игры активны в меню!')"><i class="fas fa-dice"></i><span>DICE</span></div>
        <div class="game-card" onclick="alert('Игры активны в меню!')"><i class="fas fa-bomb"></i><span>MINES</span></div>
        <div class="game-card" onclick="alert('Игры активны в меню!')"><i class="fas fa-chart-line"></i><span>CRASH</span></div>
        <div class="game-card" onclick="alert('Игры активны в меню!')"><i class="fas fa-gem"></i><span>SLOTS</span></div>
    </div>
</div>

<div id="m-admin" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-s)">ADMIN PANEL</h2>
        <p style="font-size: 12px; color: #666;">Управление данными игрока</p>
        <input type="number" id="adm-bal" class="admin-input" placeholder="Новый баланс">
        <input type="number" id="adm-xp" class="admin-input" placeholder="Новый XP (для ранга)">
        <button class="btn-click" onclick="saveAdmin()">ПРИМЕНИТЬ</button>
        <button onclick="closeMod()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    let data = {
        bal: parseInt(localStorage.getItem('lux_bal')) || 1000,
        xp: parseInt(localStorage.getItem('lux_xp')) || 0
    };

    const ranks = [
        { n: "Новичок", min: 0 },
        { n: "Игрок", min: 500 },
        { n: "Хайроллер", min: 2000 },
        { n: "Золотой Магнат", min: 10000 },
        { n: "ВЛАДЕЛЕЦ", min: 50000 }
    ];

    function update() {
        document.getElementById('bal').innerText = data.bal.toLocaleString() + " 💸";
        
        // Ранги
        let currentRank = ranks[0].n;
        let nextRankXp = 500;
        
        for (let i = 0; i < ranks.length; i++) {
            if (data.xp >= ranks[i].min) {
                currentRank = ranks[i].n;
                nextRankXp = ranks[i+1] ? ranks[i+1].min : ranks[i].min;
            }
        }

        document.getElementById('rank-name').innerText = currentRank;
        document.getElementById('xp-text').innerText = `XP: ${data.xp} / ${nextRankXp}`;
        
        let progress = (data.xp / nextRankXp) * 100;
        document.getElementById('xp-bar').style.width = (progress > 100 ? 100 : progress) + "%";

        localStorage.setItem('lux_bal', data.bal);
        localStorage.setItem('lux_xp', data.xp);
    }

    function clickWork() {
        data.bal += 5;
        data.xp += 2;
        update();
    }

    function closeMod() { document.getElementById('m-admin').style.display = 'none'; }

    let taps = 0;
    function adm() {
        taps++;
        if(taps >= 5) {
            let p = prompt("PASSWORD:");
            if(p === "777") document.getElementById('m-admin').style.display = 'flex';
            taps = 0;
        }
    }

    function saveAdmin() {
        let b = document.getElementById('adm-bal').value;
        let x = document.getElementById('adm-xp').value;
        if(b) data.bal = parseInt(b);
        if(x) data.xp = parseInt(x);
        update();
        closeMod();
    }

    update();
</script>
</body>
</html>
