<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY CASINO GOLD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9f295 45%, #b38728 70%, #f9f295 100%);
            --gold-s: #d4af37;
            --bg: #050505;
            --card: #111;
        }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }

        h1 { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 30px; font-weight: 900; text-align: center; margin: 10px 0; cursor: pointer; }

        .balance-box { background: var(--card); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .bal-val { font-size: 32px; font-weight: 800; display: block; margin: 5px 0; color: #fff; }

        .btn-gold { background: var(--gold); border: none; padding: 14px; border-radius: 12px; color: #000; font-weight: 800; width: 100%; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-gold:active { transform: scale(0.97); }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .game-card:active { border-color: var(--gold-s); }
        .game-card i { font-size: 24px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; display: block; }
        .game-card span { font-size: 12px; font-weight: 700; color: #888; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #151515; border: 1px solid var(--gold-s); border-radius: 20px; padding: 20px; width: 100%; max-width: 320px; text-align: center; }

        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin: 10px 0; border-radius: 8px; box-sizing: border-box; text-align: center; }

        /* Mines Grid */
        .mines-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .cell { aspect-ratio: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        #crash-val { font-size: 40px; font-weight: 900; margin: 20px 0; color: var(--gold-s); }
    </style>
</head>
<body>

<div class="container">
    <h1 onclick="adminTap()">AR1XY CASINO</h1>
    
    <div class="balance-box">
        <span style="font-size: 11px; color: #666; letter-spacing: 1px;">ВАШ БАЛАНС</span>
        <span class="bal-val" id="bal">0</span>
        <button class="btn-gold" onclick="addMoney(1)">КЛИКАТЬ (+1 💸)</button>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('dice')">
            <i class="fas fa-dice"></i>
            <span>DICE (x2)</span>
        </div>
        <div class="game-card" onclick="initMines()">
            <i class="fas fa-bomb"></i>
            <span>MINES</span>
        </div>
        <div class="game-card" onclick="openGame('coin')">
            <i class="fas fa-coins"></i>
            <span>COINFLIP</span>
        </div>
        <div class="game-card" onclick="openGame('crash')">
            <i class="fas fa-chart-line"></i>
            <span>CRASH</span>
        </div>
    </div>
</div>

<div id="m-dice" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-s)">DICE</h2>
        <input type="number" id="dice-bet" value="100">
        <div id="dice-res" style="font-size: 40px; margin: 10px;">🎲</div>
        <button class="btn-gold" onclick="playDice()">ИГРАТЬ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:10px;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="m-mines" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-s)">MINES</h2>
        <div id="mines-board" class="mines-board"></div>
        <button id="mines-take" class="btn-gold" style="display:none" onclick="takeMines()">ЗАБРАТЬ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:10px;">ВЫЙТИ</button>
    </div>
</div>

<div id="m-coin" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-s)">COINFLIP</h2>
        <input type="number" id="coin-bet" value="100">
        <div id="coin-res" style="font-size: 40px; margin: 10px;">🪙</div>
        <button class="btn-gold" onclick="playCoin()">БРОСИТЬ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:10px;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="m-crash" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-s)">CRASH</h2>
        <input type="number" id="crash-bet" value="100">
        <div id="crash-val">1.00x</div>
        <button id="crash-btn" class="btn-gold" onclick="startCrash()">СТАВКА</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:10px;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="m-admin" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold-s)">ADMIN</h2>
        <button class="btn-gold" onclick="setMoney()">УСТАНОВИТЬ БАЛАНС</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:15px;">ВЫХОД</button>
    </div>
</div>

<script>
    let bal = parseInt(localStorage.getItem('b')) || 1000;
    let mPos = [], mWin = 0, mActive = false;

    function upd() {
        document.getElementById('bal').innerText = bal.toLocaleString() + " 💸";
        localStorage.setItem('b', bal);
    }

    function addMoney(v) { bal += v; upd(); }
    function openGame(id) { document.getElementById('m-'+id).style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // DICE
    function playDice() {
        let b = parseInt(document.getElementById('dice-bet').value);
        if(bal < b) return alert("Мало монет!");
        bal -= b;
        let r = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-res').innerText = r;
        if(r > 3) { bal += b * 2; alert("ПОБЕДА!"); } else alert("ПРОИГРЫШ");
        upd();
    }

    // COIN
    function playCoin() {
        let b = parseInt(document.getElementById('coin-bet').value);
        if(bal < b) return alert("Мало монет!");
        bal -= b;
        let win = Math.random() > 0.5;
        document.getElementById('coin-res').innerText = win ? "🌕" : "🌑";
        if(win) { bal += b * 2; alert("ВЫИГРАЛ!"); } else alert("ПРОИГРАЛ");
        upd();
    }

    // MINES (3x3)
    function initMines() {
        let bet = 100; if(bal < bet) return alert("Ставка 100!");
        bal -= bet; mWin = 0; mActive = true;
        mPos = [Math.floor(Math.random()*9)];
        openGame('mines');
        const board = document.getElementById('mines-board'); board.innerHTML = '';
        for(let i=0; i<9; i++) {
            let c = document.createElement('div'); c.className = 'cell';
            c.onclick = () => {
                if(!mActive || c.innerText) return;
                if(mPos.includes(i)) { c.innerText='💣'; mActive=false; alert("BOOM!"); closeModal(); }
                else { c.innerText='💎'; mWin += 50; document.getElementById('mines-take').style.display='block'; }
            };
            board.appendChild(c);
        }
        upd();
    }
    function takeMines() { bal += (100 + mWin); mActive=false; closeModal(); upd(); }

    // CRASH
    function startCrash() {
        let b = parseInt(document.getElementById('crash-bet').value);
        if(bal < b) return alert("Мало монет!");
        bal -= b; upd();
        let mult = 1.0;
        let crashAt = (Math.random() * 3 + 1).toFixed(2);
        let btn = document.getElementById('crash-btn');
        btn.innerText = "ЗАБРАТЬ"; btn.onclick = () => {
            let win = Math.floor(b * mult); bal += win;
            alert("ЗАБРАЛ: " + win); clearInterval(timer);
            btn.innerText = "СТАВКА"; btn.onclick = startCrash; upd();
        };
        let timer = setInterval(() => {
            mult += 0.05;
            document.getElementById('crash-val').innerText = mult.toFixed(2) + "x";
            if(mult >= crashAt) {
                clearInterval(timer); document.getElementById('crash-val').innerText = "CRASHED!";
                btn.innerText = "СТАВКА"; btn.onclick = startCrash;
            }
        }, 100);
    }

    let t = 0;
    function adminTap() { t++; if(t >= 5) { if(prompt("PASS") === "777") openGame('admin'); t = 0; } }
    function setMoney() { let m = prompt("Сумма?"); if(m) { bal = parseInt(m); upd(); } }

    upd();
</script>
</body>
</html>
